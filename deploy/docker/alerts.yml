groups:
  - name: nodusdb
    rules:
      - alert: NodusNodeDown
        expr: up{job="nodusd"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "NodusDB node is down"
          description: "{{ $labels.instance }} has been unreachable for over 1 minute."

      - alert: NodusHighQueryErrorRate
        expr: |
          rate(nodus_query_errors_total[5m])
            / clamp_min(rate(nodus_queries_total[5m]), 1) > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Elevated query error rate"
          description: "More than 5% of queries are failing on {{ $labels.instance }}."

      - alert: NodusNoActiveSessions
        expr: nodus_active_sessions == 0
        for: 30m
        labels:
          severity: info
        annotations:
          summary: "No active sessions"
          description: "{{ $labels.instance }} has had no client sessions for 30 minutes."
