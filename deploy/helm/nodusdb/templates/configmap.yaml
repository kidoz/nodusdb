apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nodusdb.fullname" . }}-config
  labels:
    {{- include "nodusdb.labels" . | nindent 4 }}
data:
  nodus.toml: |
    [server]
    pgwire_addr = "0.0.0.0:{{ .Values.service.pgwirePort }}"
    http_addr = "0.0.0.0:{{ .Values.service.httpPort }}"
    max_connections = {{ .Values.config.maxConnections }}

    [backup]
    repository_uri = "{{ .Values.config.backupRepositoryUri }}"

    [admin]
    {{- if .Values.config.adminToken }}
    token = "{{ .Values.config.adminToken }}"
    {{- end }}
    {{- if .Values.config.adminPassword }}
    password = "{{ .Values.config.adminPassword }}"
    {{- end }}

    [observability]
    metrics_enabled = true
    log_level = "{{ .Values.config.logLevel }}"
    log_redaction = true
