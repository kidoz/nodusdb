{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "nodusdb.fullname" . }}
  labels:
    {{- include "nodusdb.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "nodusdb.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.serviceMonitor.interval }}
{{- end }}
