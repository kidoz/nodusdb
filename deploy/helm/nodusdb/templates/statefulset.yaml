apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "nodusdb.fullname" . }}
  labels:
    {{- include "nodusdb.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "nodusdb.fullname" . }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "nodusdb.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nodusdb.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: nodusd
          image: {{ include "nodusdb.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: NODUS_CONFIG
              value: /etc/nodus/nodus.toml
          ports:
            - name: pgwire
              containerPort: {{ .Values.service.pgwirePort }}
            - name: http
              containerPort: {{ .Values.service.httpPort }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/nodus
            - name: data
              mountPath: /var/lib/nodus/data
      volumes:
        - name: config
          configMap:
            name: {{ include "nodusdb.fullname" . }}-config
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.persistence.storageClass }}
        storageClassName: {{ . }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}
