{{- if .Values.tls }}
{{- if .Values.tls.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "nodusdb.fullname" . }}-tls
  labels:
    {{- include "nodusdb.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  # Provide base64-encoded PEM material via --set-file or a sealed secret.
  tls.crt: {{ .Values.tls.cert | default "" | quote }}
  tls.key: {{ .Values.tls.key | default "" | quote }}
{{- end }}
{{- end }}
