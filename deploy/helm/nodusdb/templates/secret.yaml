{{- $adminSecretName := printf "%s-admin" (include "nodusdb.fullname" .) -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $adminSecretName -}}
{{- $existingToken := "" -}}
{{- $existingPassword := "" -}}
{{- if $existing -}}
  {{- with index $existing.data "admin-token" -}}
    {{- $existingToken = (. | b64dec) -}}
  {{- end -}}
  {{- with index $existing.data "admin-password" -}}
    {{- $existingPassword = (. | b64dec) -}}
  {{- end -}}
{{- end -}}
{{- $adminToken := default (default (randAlphaNum 32) $existingToken) .Values.config.adminToken -}}
{{- $adminPassword := default (default (randAlphaNum 32) $existingPassword) .Values.config.adminPassword -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $adminSecretName }}
  labels:
    {{- include "nodusdb.labels" . | nindent 4 }}
type: Opaque
data:
  admin-token: {{ $adminToken | b64enc | quote }}
  admin-password: {{ $adminPassword | b64enc | quote }}
{{- if .Values.tls }}
{{- if .Values.tls.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "nodusdb.fullname" . }}-tls
  labels:
    {{- include "nodusdb.labels" . | nindent 4 }}
type: kubernetes.io/tls
stringData:
  # Provide raw PEM material via --set-file or a sealed secret.
  tls.crt: {{ .Values.tls.cert | default "" | quote }}
  tls.key: {{ .Values.tls.key | default "" | quote }}
  {{- if .Values.tls.clientCa }}
  client-ca.crt: {{ .Values.tls.clientCa | quote }}
  {{- end }}
{{- end }}
{{- end }}
