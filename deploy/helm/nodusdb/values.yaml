replicaCount: 3

image:
  repository: ghcr.io/kidoz/nodusdb
  tag: ""          # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  pgwirePort: 5432
  httpPort: 8088

# Mounted at /etc/nodus/nodus.toml. Values here become the node config.
config:
  logLevel: info
  maxConnections: 100
  backupRepositoryUri: "file:///var/lib/nodus/backups"
  # Authentication token for admin APIs (e.g. /api/v1/backups, /api/v1/shards, etc.)
  # If left empty, admin endpoints will be exposed unauthenticated.
  adminToken: ""
  # Password for the default 'nodus' superuser over pgwire.
  # If left empty, a random password will be generated.
  adminPassword: ""

persistence:
  enabled: true
  size: 10Gi
  # storageClass: ""

podDisruptionBudget:
  enabled: true
  minAvailable: 2

# Emit a Prometheus Operator ServiceMonitor.
serviceMonitor:
  enabled: false
  interval: 15s

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}
